<!-- A complex SVG with gradients, paths, groups, transforms, and various attributes -->
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="200" height="200" viewBox="0 0 200 200">
  <!-- Header comment that should be removed -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgb(255,255,0);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgb(255,0,0);stop-opacity:1" />
    </linearGradient>
    <radialGradient id="grad2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:rgb(0,0,255);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgb(0,0,128);stop-opacity:1" />
    </radialGradient>
    <clipPath id="clip1">
      <rect x="10" y="10" width="80" height="80" />
    </clipPath>
  </defs>
  <g id="main-group" transform="translate(10,10) scale(0.5)">
    <rect x="0" y="0" width="100" height="100" fill="url(#grad1)" stroke="black" stroke-width="2" />
    <circle cx="150" cy="50" r="40" fill="url(#grad2)" />
    <ellipse cx="100" cy="150" rx="50" ry="30" fill="green" />
    <path d="M 0 0 L 50 50 L 0 50 Z" fill="red" stroke="none" />
    <polygon points="200,10 250,190 160,100 240,100 150,190" fill="lime" stroke="purple" stroke-width="2" />
    <polyline points="300,10 350,190 260,100 340,100 250,190" fill="none" stroke="blue" stroke-width="3" />
    <line x1="0" y1="0" x2="200" y2="200" stroke="black" stroke-width="1" />
  </g>
  <text x="10" y="190" font-family="Arial" font-size="12" fill="black">Hello SVG</text>
  <image xlink:href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==" x="0" y="0" width="1" height="1" />
  <use xlink:href="#main-group" x="100" y="0" />
</svg>
