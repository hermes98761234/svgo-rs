<!-- An SVG with various style attributes, classes, and inline styles -->
<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300">
  <style type="text/css">
    .fill-red { fill: red; }
    .stroke-blue { stroke: blue; stroke-width: 2px; }
    .big-text { font-size: 24px; font-family: sans-serif; }
    #special { fill: green; }
  </style>
  <defs>
    <pattern id="pat1" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="10" height="10" fill="#ccc" />
      <rect x="10" y="10" width="10" height="10" fill="#ddd" />
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="0" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#000" />
    </marker>
  </defs>
  <g class="fill-red" style="opacity: 0.8;">
    <rect x="10" y="10" width="80" height="80" class="stroke-blue" style="fill: yellow;" />
    <circle cx="150" cy="50" r="35" class="fill-red stroke-blue" />
    <rect x="10" y="100" width="200" height="50" fill="url(#pat1)" />
  </g>
  <g transform="rotate(45, 150, 200)">
    <rect x="100" y="170" width="100" height="60" fill="none" stroke="black" stroke-width="3" marker-end="url(#arrow)" />
  </g>
  <text x="10" y="280" class="big-text" fill="navy">Styled SVG Test</text>
  <path d="M 250 10 Q 275 50 250 90 T 250 150" fill="none" stroke="red" stroke-width="2" />
  <text x="200" y="250" style="font-size:14px;fill:#333;">Inline styled text</text>
</svg>
